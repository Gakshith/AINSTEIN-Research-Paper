name: Deploy static dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        # Only what scripts/build_static.py needs (renders templates + reads
        # sample data). Pins match requirements.txt; avoids the heavy runtime deps.
        run: pip install jinja2==3.1.6 pandas==3.0.3 PyYAML==6.0.3 python-box==7.4.1 ensure==1.0.4 joblib==1.5.3

      - name: Build static site
        run: AINSTEIN_SAMPLE=1 python scripts/build_static.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
